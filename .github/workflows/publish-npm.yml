name: Publish npm packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - package.json
      - package-lock.json
      - scripts/**
      - packages/core/**
      - packages/astro-reader/**
      - packages/mcp-server/**
      - packages/create-narrarium-book/**
  release:
    types:
      - published

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Verify release tag
        if: github.event_name == 'release'
        run: node scripts/check-release-tag.mjs

      - name: Determine publish plan
        id: plan
        run: node scripts/check-unpublished-workspaces.mjs

      - name: No unpublished packages
        if: steps.plan.outputs.has_changes != 'true'
        run: echo "No unpublished package versions detected on this revision."

      - name: Install dependencies
        if: steps.plan.outputs.has_changes == 'true'
        run: npm ci

      - name: Release checks
        if: steps.plan.outputs.has_changes == 'true'
        run: npm run release:check

      - name: Publish packages
        if: steps.plan.outputs.has_changes == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-workspaces.mjs
