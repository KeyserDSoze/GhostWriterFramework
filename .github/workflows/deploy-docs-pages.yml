name: Deploy GitHub Pages Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - README.md
      - AGENTS.md
      - docs/**
      - packages/*/README.md
      - packages/docs-site/**
      - packages/mcp-server/src/index.ts
      - packages/mcp-server/src/public-http-server.ts
      - package.json
      - package-lock.json

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build docs site
        env:
          DOCS_BASE: /
          DOCS_SITE_URL: https://narrarium.net
          MCP_PUBLIC_URL: https://narrarium.space/mcp
          MCP_HEALTH_URL: https://narrarium.space/health
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
